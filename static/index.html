<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amazon ERP — 库存管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { amazon: '#FF9900' },
        },
      },
    };
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    @keyframes shimmer {
      0% {
        background-position: -400px 0;
      }

      100% {
        background-position: 400px 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    .inv-row {
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid #e5e7eb;
    }

    .inv-row:hover {
      background: #fff7ed !important;
    }

    .inv-row.selected {
      background: #ffedd5 !important;
      box-shadow: inset 3px 0 0 #FF9900;
    }

    #detail-panel {
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.22s ease;
      opacity: 0;
      width: 0;
      min-height: 0;
      height: 100%;
      flex-shrink: 0;
      overflow: hidden;
    }

    #detail-panel.open {
      opacity: 1;
      width: 52vw;
      min-width: 52vw;
      display: flex;
      flex-direction: column;
    }

    #detail-inner {
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    #detail-inner::-webkit-scrollbar {
      width: 6px;
    }

    #detail-inner::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    #detail-inner::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Section expand/collapse */
    .detail-card {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .section-body {
      transition: opacity 0.22s ease, padding 0.22s ease;
      opacity: 1;
      overflow: visible;
    }

    .section-body.collapsed {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding-top: 0 !important;
      padding-bottom: 0 !important;
    }

    .inv-bar-seg {
      height: 10px;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .4
      }
    }

    .pulse-dot {
      animation: pulse 1.8s ease-in-out infinite;
    }

    .stat-card {
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .section-header {
      cursor: pointer;
      user-select: none;
    }

    .chevron {
      transition: transform 0.2s;
    }

    .chevron.up {
      transform: rotate(180deg);
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="bg-white text-slate-800 flex flex-col" style="height:100vh;overflow:hidden">

  <nav class="h-14 bg-white border-b border-gray-200 flex items-center px-5 shrink-0 gap-5 z-10 shadow-sm">
    <div class="flex items-center gap-2.5 mr-2">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#FF9900" />
        <path d="M7 19c3-3 11-3 14 0" stroke="white" stroke-width="2" stroke-linecap="round" />
        <circle cx="14" cy="11" r="4" fill="white" />
      </svg>
      <span class="font-bold text-lg tracking-tight text-slate-900">Amazon <span class="text-amazon">ERP</span></span>
    </div>

    <div class="flex items-center gap-1 text-sm">
      <button class="px-3 py-1.5 rounded-md font-medium text-slate-900 bg-gray-100">
        库存管理
      </button>
      <button onclick="window.open('/api/docs','_blank')"
        class="px-3 py-1.5 rounded-md font-medium text-slate-500 hover:text-slate-900 hover:bg-gray-100 transition-colors">
        API 文档
      </button>
    </div>

    <div class="ml-auto flex items-center gap-3 text-sm">
      <span id="marketplace-badge" class="px-2.5 py-1 bg-gray-100 rounded-md text-slate-600 text-xs font-mono">
        Loading…
      </span>
      <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-300"></div>
      <button onclick="loadInventory()" title="刷新全部库存"
        class="p-1.5 rounded-md text-slate-500 hover:text-slate-900 hover:bg-gray-100 transition-colors">
        <svg id="refresh-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"
          viewBox="0 0 24 24">
          <path d="M1 4v6h6M23 20v-6h-6" />
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15" />
        </svg>
      </button>
      <a href="/api/docs" target="_blank" title="OpenAPI 文档"
        class="p-1.5 rounded-md text-slate-500 hover:text-slate-900 hover:bg-gray-100 transition-colors">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 16v-4M12 8h.01" />
        </svg>
      </a>
    </div>
  </nav>

  <div class="flex-1 flex overflow-hidden min-h-0">

    <div class="flex-1 flex flex-col overflow-hidden p-5 gap-4 min-w-0">

      <div id="stats-row" class="grid grid-cols-4 gap-3 shrink-0">
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
        <div class="skeleton h-20 rounded-xl"></div>
      </div>

      <div class="flex items-center gap-2.5 shrink-0">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" width="15" height="15" fill="none"
            stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input id="search-input" type="text" placeholder="搜索 SKU / ASIN / FNSKU…" oninput="handleSearch(this.value)"
            class="w-full pl-9 pr-4 py-2 bg-white border border-gray-300 rounded-lg text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:border-amazon focus:ring-1 focus:ring-amazon/30 transition-colors" />
        </div>
        <select id="condition-filter" onchange="handleFilter()"
          class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-amazon">
          <option value="">全部状态</option>
          <option value="NewItem">New</option>
          <option value="UsedGood">Used</option>
        </select>
        <select id="sort-select" onchange="handleSort(this.value)"
          class="px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm text-slate-700 focus:outline-none focus:border-amazon">
          <option value="fulfillable_qty-desc">可发货 ↓</option>
          <option value="fulfillable_qty-asc">可发货 ↑</option>
          <option value="total_qty-desc">总库存 ↓</option>
          <option value="sku-asc">SKU A→Z</option>
        </select>
        <button onclick="exportCsv()"
          class="flex items-center gap-1.5 px-3 py-2 bg-white border border-gray-300 rounded-lg text-sm text-slate-700 hover:text-slate-900 hover:border-gray-400 transition-colors">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
          </svg>
          导出 CSV
        </button>
      </div>

      <div class="flex-1 overflow-auto rounded-xl border border-gray-200 bg-white shadow-sm">
        <table class="w-full text-sm border-collapse" style="min-width:700px">
          <thead class="sticky top-0 bg-gray-50 z-10">
            <tr class="text-slate-500 text-xs uppercase tracking-wider">
              <th class="text-left px-4 py-3 font-semibold">SKU</th>
              <th class="text-left px-3 py-3 font-semibold">ASIN</th>
              <th class="text-right px-3 py-3 font-semibold">可发货</th>
              <th class="text-right px-3 py-3 font-semibold">入库中</th>
              <th class="text-right px-3 py-3 font-semibold">总计</th>
              <th class="text-center px-3 py-3 font-semibold">库存健康</th>
            </tr>
          </thead>
          <tbody id="inventory-tbody">
            <tr>
              <td colspan="6" class="px-4 py-3">
                <div class="skeleton h-4 w-full rounded"></div>
              </td>
            </tr>
            <tr>
              <td colspan="6" class="px-4 py-3">
                <div class="skeleton h-4 w-5/6 rounded"></div>
              </td>
            </tr>
            <tr>
              <td colspan="6" class="px-4 py-3">
                <div class="skeleton h-4 w-4/5 rounded"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="table-footer" class="shrink-0 text-xs text-slate-500 text-right -mt-1"></div>
    </div>

    <div id="detail-panel"
      class="bg-white border-l border-gray-200 flex flex-col min-h-0 h-full shrink-0 overflow-hidden">
      <div id="detail-inner" class="flex flex-col flex-1 min-h-0 p-6 gap-5 pb-8">
      </div>
    </div>

  </div>

  <script>
    const S = {
      inventory: [],
      filtered: [],
      selected: null,
      detail: null,
      detailLoading: false,
      query: '',
      condition: '',
      sortKey: 'fulfillable_qty',
      sortDir: 'desc',
      salesChart: null,
      lastUpdated: null,
    };

    const $ = id => document.getElementById(id);
    const fmt = (v, fallback = '—') => v != null ? Number(v).toLocaleString() : fallback;
    const fmtMoney = (amount, currency) =>
      amount != null ? `${Number(amount).toLocaleString()} ${currency || ''}`.trim() : '—';

    function inbound(r) {
      return (r.inbound_working_qty || 0) + (r.inbound_shipped_qty || 0) + (r.inbound_receiving_qty || 0);
    }

    function healthBadge(fulfillable) {
      if (fulfillable == null) return '<span class="text-slate-500 text-xs">—</span>';
      if (fulfillable === 0) return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-500/20 text-red-400">缺货</span>';
      if (fulfillable < 30) return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-red-500/20 text-red-400">紧急</span>';
      if (fulfillable < 100) return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-yellow-500/20 text-yellow-400">偏低</span>';
      return '<span class="px-2 py-0.5 rounded-full text-xs font-semibold bg-green-500/20 text-green-400">充足</span>';
    }

    function supplyBadge(days) {
      if (days == null) return '<span class="text-slate-500 text-xs">— 天</span>';
      const d = parseFloat(days);
      if (d < 20) return `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-red-500/20 text-red-400">${d} 天 ⚠</span>`;
      if (d < 40) return `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-yellow-500/20 text-yellow-400">${d} 天</span>`;
      if (d < 70) return `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-blue-500/20 text-blue-400">${d} 天</span>`;
      return `<span class="px-2 py-0.5 rounded-full text-xs font-bold bg-green-500/20 text-green-400">${d} 天</span>`;
    }

    function supplyBarColor(days, target) {
      const pct = days / target;
      if (pct < 0.33) return 'bg-red-500';
      if (pct < 0.66) return 'bg-yellow-500';
      return 'bg-green-500';
    }

    function replenishMetrics(rep, fulfillable, inboundTotal) {
      const avg = rep.avg_daily_sales || 0;
      const target = rep.target_days || 60;
      const onHandDays = rep.days_of_supply;
      const totalDays = rep.days_of_supply_total ?? (avg > 0
        ? Math.round((fulfillable + inboundTotal) / avg * 10) / 10
        : null);
      const suggested = rep.suggested_order_qty ?? 0;
      const coveredByInbound = rep.status === 'covered_by_inbound' || (
        suggested === 0
        && onHandDays != null
        && onHandDays < target
        && inboundTotal > 0
        && totalDays != null
        && totalDays >= target
      );
      return { onHandDays, totalDays, target, suggested, coveredByInbound };
    }

    function replenishHeaderBadge(m, rep) {
      if (m.suggested > 0 || rep?.status === 'needs_restock') {
        return '<span class="ml-1 px-2 py-0.5 rounded-full bg-orange-500/20 text-orange-400 text-xs font-semibold">需补货</span>';
      }
      if (m.coveredByInbound || rep?.status === 'covered_by_inbound') {
        return '<span class="ml-1 px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400 text-xs font-semibold">在途覆盖</span>';
      }
      if (m.totalDays != null && m.totalDays >= m.target) {
        return '<span class="ml-1 px-2 py-0.5 rounded-full bg-green-500/20 text-green-400 text-xs font-semibold">库存充足</span>';
      }
      return '';
    }

    function replenishHint(m, inboundTotal) {
      if (m.coveredByInbound) {
        return `
          <div class="rounded-lg bg-blue-50 border border-blue-200 px-4 py-3 flex gap-2.5 items-start text-sm text-blue-800">
            <svg class="shrink-0 mt-0.5 text-blue-500" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
            </svg>
            <p>现货可售仅 <strong>${m.onHandDays} 天</strong>，但在途 <strong>${fmt(inboundTotal)} 件</strong> 到货后合计 <strong>${m.totalDays} 天</strong>，已覆盖 ${m.target} 天目标，暂无需订货。</p>
          </div>`;
      }
      if (m.suggested === 0 && m.totalDays != null && m.totalDays >= m.target && inboundTotal === 0) {
        return `
          <div class="rounded-lg bg-green-50 border border-green-200 px-4 py-3 text-sm text-green-800">
            现货可售 <strong>${m.totalDays} 天</strong>，已达 ${m.target} 天目标，暂无需订货。
          </div>`;
      }
      return '';
    }

    async function apiFetch(path) {
      const r = await fetch('/api' + path);
      if (!r.ok) {
        const text = await r.text();
        throw new Error(`HTTP ${r.status}: ${text}`);
      }
      return r.json();
    }

    async function loadInventory() {
      setStatus('loading');
      animateRefreshIcon(true);
      try {
        S.inventory = await apiFetch('/inventory/');
        S.lastUpdated = new Date();
        applyFilter();
        renderStats();
        setStatus('ok');
      } catch (err) {
        showTableError(err.message);
        setStatus('error');
      }
      animateRefreshIcon(false);
    }

    async function loadSkuDetail(sku) {
      if (S.selected === sku && S.detail && !S.detailLoading) return;
      S.selected = sku;
      S.detail = null;
      S.detailLoading = true;
      openDetailPanel();
      renderDetailLoading(sku);
      highlightRow(sku);
      try {
        S.detail = await apiFetch(`/inventory/${encodeURIComponent(sku)}`);
        S.detailLoading = false;
        renderDetail();
      } catch (err) {
        S.detailLoading = false;
        renderDetailError(sku, err.message);
      }
    }

    function handleSearch(v) { S.query = v.trim().toLowerCase(); applyFilter(); }
    function handleFilter() { S.condition = $('condition-filter').value; applyFilter(); }
    function handleSort(v) {
      const [key, dir] = v.split('-');
      S.sortKey = key; S.sortDir = dir; applyFilter();
    }

    function applyFilter() {
      let data = [...S.inventory];
      if (S.query) {
        data = data.filter(r =>
          (r.sku || '').toLowerCase().includes(S.query) ||
          (r.asin || '').toLowerCase().includes(S.query) ||
          (r.fnsku || '').toLowerCase().includes(S.query)
        );
      }
      if (S.condition) data = data.filter(r => r.condition === S.condition);
      data.sort((a, b) => {
        let va = a[S.sortKey] ?? -1;
        let vb = b[S.sortKey] ?? -1;
        if (S.sortKey === 'sku') { va = a.sku || ''; vb = b.sku || ''; }
        if (typeof va === 'string') return S.sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
        return S.sortDir === 'asc' ? va - vb : vb - va;
      });
      S.filtered = data;
      renderTable();
    }

    function renderStats() {
      const inv = S.inventory;
      const totalSkus = inv.length;
      const totalFulfillable = inv.reduce((s, r) => s + (r.fulfillable_qty || 0), 0);
      const totalInbound = inv.reduce((s, r) => s + inbound(r), 0);
      const alerts = inv.filter(r => (r.fulfillable_qty || 0) < 30).length;
      const cards = [
        { label: '总 SKU 数', value: fmt(totalSkus), icon: iconBox(), color: 'text-blue-400', bg: 'bg-blue-500/10' },
        { label: '可发货总量', value: fmt(totalFulfillable), icon: iconCheck(), color: 'text-green-400', bg: 'bg-green-500/10' },
        { label: '入库中总量', value: fmt(totalInbound), icon: iconTruck(), color: 'text-amber-400', bg: 'bg-amber-500/10' },
        { label: '低库存预警', value: fmt(alerts), icon: iconAlert(), color: 'text-red-400', bg: 'bg-red-500/10' },
      ];

      $('stats-row').innerHTML = cards.map(c => `
      <div class="stat-card rounded-xl border border-gray-200 bg-white shadow-sm p-4 flex items-center gap-4">
        <div class="w-10 h-10 rounded-lg ${c.bg} flex items-center justify-center shrink-0 ${c.color}">${c.icon}</div>
        <div>
          <p class="text-xs text-slate-500 font-medium mb-0.5">${c.label}</p>
          <p class="text-2xl font-bold text-slate-900 tracking-tight">${c.value}</p>
        </div>
      </div>`).join('');

      const badge = $('marketplace-badge');
      if (badge && S.lastUpdated) badge.textContent = `更新于 ${S.lastUpdated.toLocaleTimeString('zh-CN')}`;
    }

    function renderTable() {
      const tbody = $('inventory-tbody');
      const footer = $('table-footer');

      if (!S.filtered.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="py-16 text-center text-slate-500">
        ${S.query ? `没有找到 "<span class="text-slate-700">${S.query}</span>"` : '暂无库存数据'}
      </td></tr>`;
        footer.textContent = '';
        return;
      }

      tbody.innerHTML = S.filtered.map((r, i) => {
        const ib = inbound(r);
        const isSelected = r.sku === S.selected ? ' selected' : '';
        const bg = i % 2 === 0 ? 'bg-gray-50' : 'bg-white';
        return `
        <tr class="inv-row ${bg}${isSelected}" onclick="loadSkuDetail('${escHtml(r.sku || '')}')">
          <td class="px-4 py-2.5 font-mono text-xs text-slate-800 max-w-[180px] truncate"
              title="${escHtml(r.sku || '')}">${escHtml(r.sku || '—')}</td>
          <td class="px-3 py-2.5 font-mono text-xs text-slate-600">${escHtml(r.asin || '—')}</td>
          <td class="px-3 py-2.5 text-right font-semibold text-slate-900">${fmt(r.fulfillable_qty)}</td>
          <td class="px-3 py-2.5 text-right text-slate-600">${fmt(ib || null)}</td>
          <td class="px-3 py-2.5 text-right font-medium text-slate-700">${fmt(r.total_qty)}</td>
          <td class="px-3 py-2.5 text-center">${healthBadge(r.fulfillable_qty)}</td>
        </tr>`;
      }).join('');

      footer.textContent = `显示 ${S.filtered.length} / ${S.inventory.length} 条记录`;
    }

    function renderDetailLoading(sku) {
      $('detail-inner').innerHTML = `
      <div class="flex items-start justify-between shrink-0 pb-2 border-b border-gray-200">
        <div>
          <p class="text-xs text-slate-500 mb-1 uppercase tracking-wider font-medium">SKU 详情</p>
          <h2 class="text-base font-bold font-mono text-slate-900">${escHtml(sku)}</h2>
        </div>
        <button onclick="closeDetail()" class="p-1.5 rounded-lg hover:bg-gray-100 text-slate-600 hover:text-slate-900">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="space-y-3 pt-1">
        ${[160, 100, 220, 180, 130].map(w => `<div class="skeleton h-5 rounded" style="width:${w}px"></div>`).join('')}
      </div>
      <div class="skeleton h-44 rounded-xl"></div>
      <div class="skeleton h-60 rounded-xl"></div>
      <div class="skeleton h-48 rounded-xl"></div>
      <div class="skeleton h-40 rounded-xl"></div>`;
    }

    function renderDetailError(sku, msg) {
      $('detail-inner').innerHTML = `
      ${detailHeader(sku, {})}
      <div class="rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600">
        <p class="font-semibold mb-1">加载失败</p>
        <p class="text-xs font-mono break-all">${escHtml(msg)}</p>
      </div>`;
    }

    function renderDetail() {
      const d = S.detail;
      if (!d) return;

      destroyCharts();

      const prod = d.product || {};
      const listing = d.listing || {};
      const inv = d.inventory || {};
      const sales = d.sales || {};
      const rep = d.replenishment_computed || {};

              pointHoverRadius: 4,
              type: 'line',
              yAxisID: 'y1',
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#64748b', font: { size: 11 }, boxWidth: 12, padding: 10 } },

                font: { size: 10 },
                maxTicksLimit: 8,
                maxRotation: 0,

            },
            y: {
              position: 'left',
              grid: { color: '#f1f5f9' },
              ticks: { color: '#64748b', font: { size: 10 } },
              title: { display: true, text: '件数', color: '#94a3b8', font: { size: 10 } },

    function drawInvBar(inv, total, ibWork, ibShip, ibRecv) {
      const bar = document.getElementById('inv-bar');
      if (!bar || !total) return;

        { val: inv.fulfillable_qty || 0, color: '#22c55e' },
        { val: ibWork, color: '#3b82f6' },
        { val: ibShip, color: '#60a5fa' },

        .map(s => {
          const pct = Math.max(1, Math.round(s.val / total * 100));
          return `<div class="inv-bar-seg" style="width:${pct}%;background:${s.color}"></div>`;
        }).join('');
    }

    function destroyCharts() {
      if (S.salesChart) { S.salesChart.destroy(); S.salesChart = null; }
    }

    function detailHeader(sku, d) {
      return `
      <div class="flex items-start justify-between shrink-0 pb-2 border-b border-gray-200">
        <div class="min-w-0">
          <p class="text-xs text-slate-500 mb-1 uppercase tracking-wider font-medium">SKU 详情</p>
          <h2 class="text-base font-bold font-mono text-slate-900 leading-tight"
              title="${escHtml(sku || '')}">${escHtml(sku || '—')}</h2>
          ${d.asin ? `<a href="https://www.amazon.co.jp/dp/${escHtml(d.asin)}" target="_blank"
              class="text-xs font-mono text-amazon hover:underline mt-0.5 inline-block">${escHtml(d.asin)}</a>` : ''}
        </div>
        <button onclick="closeDetail()"
          class="p-1.5 rounded-lg hover:bg-gray-100 text-slate-600 hover:text-slate-900 transition-colors shrink-0 ml-3 mt-0.5">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>`;
    }

    function detailRowWide(label, value) {
      if (value == null || value === '') return '';
      return `
      <div class="flex flex-col gap-0.5">
        <span class="text-xs text-slate-500 font-medium">${escHtml(String(label))}</span>
        <span class="text-sm text-slate-800 font-mono break-all">${escHtml(String(value))}</span>
      </div>`;
    }

    function invBarRow(label, qty, total, color) {
      if (qty == null) return '';
      const pct = total > 0 ? Math.round(qty / total * 100) : 0;
      return `
      <div class="flex items-center gap-3 text-sm">
        <div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${color}"></div>
        <span class="text-slate-600 flex-1">${label}</span>
        <span class="text-slate-800 font-mono font-semibold w-16 text-right">${fmt(qty)}</span>
        <span class="text-slate-500 w-10 text-right text-xs">${pct}%</span>
      </div>`;
    }

    function salesCard(label, metrics) {
      const units = metrics?.unit_count ?? null;
      const rev = metrics?.revenue_amount ?? null;
      const cur = metrics?.revenue_currency ?? '';
      return `
      <div class="rounded-lg bg-gray-50 border border-gray-200 p-3 text-center">
        <p class="text-xs text-slate-500 mb-1.5">${label}</p>
        <p class="text-2xl font-bold ${units ? 'text-slate-900' : 'text-slate-400'}">${fmt(units)}</p>
        <p class="text-xs text-slate-500 mt-1">${rev != null ? fmtMoney(rev, cur) : '—'}</p>
      </div>`;
    }

    function toggleSection(header) {
      const body = header.nextElementSibling;
      const chevron = header.querySelector('.chevron');
      const isCollapsed = body.classList.contains('collapsed');
      body.classList.toggle('collapsed', !isCollapsed);
      chevron.classList.toggle('up', !isCollapsed);
    }

    function openDetailPanel() { $('detail-panel').classList.add('open'); }

    function closeDetail() {
      S.selected = null;
      S.detail = null;
      destroyCharts();
      $('detail-panel').classList.remove('open');
      highlightRow(null);
    }

    function highlightRow(sku) {
      document.querySelectorAll('.inv-row').forEach(tr => {
        const cell = tr.querySelector('td:first-child');
        if (cell) tr.classList.toggle('selected', (cell.title || cell.textContent.trim()) === sku);
      });
    }

    function showTableError(msg) {
      $('inventory-tbody').innerHTML = `
      <tr><td colspan="6" class="py-12 text-center">
        <p class="text-red-400 font-medium mb-2">加载失败</p>
        <p class="text-xs text-slate-500 font-mono">${escHtml(msg)}</p>
        <button onclick="loadInventory()" class="mt-4 px-4 py-2 bg-gray-100 rounded-lg text-sm text-slate-700 hover:text-slate-900">重试</button>
      </td></tr>`;
    }

    function setStatus(s) {
      const dot = $('status-dot');
      dot.className = 'w-2 h-2 rounded-full ' + { loading: 'bg-amber-400 pulse-dot', ok: 'bg-green-500', error: 'bg-red-500' }[s];
    }

    function animateRefreshIcon(spinning) {
      const icon = $('refresh-icon');
      icon.style.animation = spinning ? 'spin 0.8s linear infinite' : '';
      icon.style.transformOrigin = 'center';
    }

    function exportCsv() {
      const cols = ['sku', 'asin', 'fnsku', 'condition', 'fulfillable_qty', 'inbound_working_qty', 'inbound_shipped_qty', 'inbound_receiving_qty', 'reserved_qty', 'unfulfillable_qty', 'total_qty'];
      const header = cols.join(',');
      const rows = S.filtered.map(r => cols.map(c => JSON.stringify(r[c] ?? '')).join(','));
      const csv = [header, ...rows].join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `fba-inventory-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click(); URL.revokeObjectURL(url);
    }

    function iconBox() { return `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>`; }
    function iconCheck() { return `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`; }
    function iconTruck() { return `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`; }
    function iconAlert() { return `<svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m10.29 3.86-8.28 14.28a1 1 0 0 0 .87 1.5h16.55a1 1 0 0 0 .87-1.5L12 3.86a1 1 0 0 0-1.71 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`; }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    loadInventory();
  </script>
</body>

</html>
